<ion-header>
  <ion-toolbar
    style="--background: #0b0713; --border-color: rgba(190, 46, 221, 0.3)"
  >
    <ion-title style="color: #be2edd; font-weight: 700"
      >لوحة تحكم التاجر</ion-title
    >
  </ion-toolbar>
</ion-header>

<ion-content
  style="--background: #0b0713; --color: #ffffff"
  class="ion-padding"
>
  <div style="max-width: 800px; margin: 0 auto">
    <ion-card
      style="
        --background: #150f22;
        border-radius: 15px;
        border: 1px solid rgba(190, 46, 221, 0.25);
        margin: 15px;
      "
    >
      <ion-card-header>
        <ion-card-title
          style="color: #be2edd; font-weight: 700; font-size: 1.3rem"
        >
          <ion-icon
            name="cube-outline"
            style="vertical-align: middle; margin-right: 6px"
          ></ion-icon>
          إضافة منتج جديد للنظام
        </ion-card-title>
      </ion-card-header>

      <ion-card-content style="padding: 20px">
        <div style="margin-bottom: 20px">
          <label
            style="
              color: #a0a0a0;
              font-size: 0.85rem;
              display: block;
              margin-bottom: 8px;
              font-weight: 600;
            "
            >تصنيف المنتج (Category) *</label
          >
          <ion-item
            lines="none"
            style="
              --background: #0b0713;
              --border-radius: 10px;
              border: 1px solid rgba(190, 46, 221, 0.15);
              --color: #ffffff;
            "
          >
            <ion-select
              placeholder="اختر التصنيف المناسب"
              [(ngModel)]="newProduct.category"
              okText="تأكيد"
              cancelText="إلغاء"
              style="width: 100%"
            >
              <ion-select-option *ngFor="let cat of categories" [value]="cat"
                >{{ cat }}</ion-select-option
              >
            </ion-select>
          </ion-item>
        </div>

        <div style="display: flex; gap: 12px; margin-bottom: 20px">
          <div style="flex: 2">
            <label
              style="
                color: #a0a0a0;
                font-size: 0.85rem;
                display: block;
                margin-bottom: 8px;
              "
              >اسم المنتج *</label
            >
            <ion-item
              lines="none"
              style="
                --background: #0b0713;
                --border-radius: 10px;
                border: 1px solid rgba(190, 46, 221, 0.15);
              "
            >
              <ion-input
                type="text"
                [(ngModel)]="newProduct.name"
                placeholder="مثال: Smart Sensor Alpha"
                style="--color: #ffffff"
              ></ion-input>
            </ion-item>
          </div>
          <div style="flex: 1">
            <label
              style="
                color: #a0a0a0;
                font-size: 0.85rem;
                display: block;
                margin-bottom: 8px;
              "
              >السعر (&euro;) *</label
            >
            <ion-item
              lines="none"
              style="
                --background: #0b0713;
                --border-radius: 10px;
                border: 1px solid rgba(190, 46, 221, 0.15);
              "
            >
              <ion-input
                type="number"
                [(ngModel)]="newProduct.price"
                placeholder="0.00"
                style="--color: #ffffff"
              ></ion-input>
            </ion-item>
          </div>
        </div>

        <div style="margin-bottom: 20px">
          <label
            style="
              color: #a0a0a0;
              font-size: 0.85rem;
              display: block;
              margin-bottom: 8px;
              font-weight: 600;
            "
            >الكمية المتوفرة بالمخزون (Stock) *</label
          >
          <div
            style="
              display: flex;
              align-items: center;
              gap: 15px;
              background: #0b0713;
              padding: 8px 15px;
              border-radius: 10px;
              border: 1px solid rgba(190, 46, 221, 0.15);
              width: 180px;
            "
          >
            <ion-button
              fill="clear"
              size="small"
              (click)="decreaseStock()"
              style="
                --color: #be2edd;
                margin: 0;
                font-weight: bold;
                font-size: 1.2rem;
              "
              >-</ion-button
            >
            <span
              style="
                color: #ffffff;
                font-weight: 700;
                font-size: 1.1rem;
                flex: 1;
                text-align: center;
              "
              >{{ newProduct.stock }}</span
            >
            <ion-button
              fill="clear"
              size="small"
              (click)="increaseStock()"
              style="
                --color: #be2edd;
                margin: 0;
                font-weight: bold;
                font-size: 1.2rem;
              "
              >+</ion-button
            >
          </div>
        </div>

        <div style="margin-bottom: 25px">
          <label
            style="
              color: #a0a0a0;
              font-size: 0.85rem;
              display: block;
              margin-bottom: 8px;
              font-weight: 600;
            "
            >الألوان المتاحة للمنتج (Dynamic Colors)</label
          >

          <div
            *ngIf="newProduct.colors?.length > 0"
            style="
              display: flex;
              flex-wrap: wrap;
              gap: 8px;
              margin-bottom: 12px;
            "
          >
            <span
              *ngFor="let color of newProduct.colors; let i = index"
              style="
                background: rgba(190, 46, 221, 0.15);
                border: 1px solid rgba(190, 46, 221, 0.4);
                color: #ffffff;
                padding: 6px 12px;
                border-radius: 8px;
                font-size: 0.85rem;
                display: flex;
                align-items: center;
                gap: 6px;
              "
            >
              {{ color }}
              <ion-icon
                name="close-circle"
                (click)="removeColor(i)"
                style="color: #ff4757; cursor: pointer; font-size: 1rem"
              ></ion-icon>
            </span>
          </div>

          <div style="display: flex; gap: 10px">
            <ion-item
              lines="none"
              style="
                --background: #0b0713;
                --border-radius: 10px;
                border: 1px solid rgba(190, 46, 221, 0.15);
                flex: 1;
              "
            >
              <ion-input
                type="text"
                [(ngModel)]="colorInput"
                placeholder="اكتبي اللون ثم اضغطي إضافة (مثال: نيون، أسود)"
                style="--color: #ffffff; font-size: 0.9rem"
              ></ion-input>
            </ion-item>
            <ion-button
              (click)="addColor()"
              color="purple"
              style="--border-radius: 10px; font-weight: 600; margin: 0"
            >
              <ion-icon name="add-outline" slot="start"></ion-icon>
              إضافة
            </ion-button>
          </div>
        </div>

        <ion-button
          expand="block"
          (click)="submitProduct()"
          color="purple"
          style="
            --border-radius: 12px;
            font-weight: 700;
            height: 48px;
            box-shadow: 0 0 15px rgba(190, 46, 221, 0.4);
            margin-top: 10px;
          "
        >
          <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
          حقن المنتج في المتجر
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
